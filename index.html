<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🛒 買い物メモ</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --card2: #22263a;
    --border: #2e3350;
    --accent: #6c8aff;
    --green: #4caf82;
    --gold: #f5c842;
    --red: #e05c5c;
    --text: #e8eaf6;
    --muted: #8891b0;
    --radius: 12px;
    --touch: 52px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f9;
      --card: #ffffff;
      --card2: #eef0f7;
      --border: #d9dcea;
      --accent: #4c6ef5;
      --text: #1d2130;
      --muted: #6b7390;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    min-height: 100vh;
  }
  button { border: none; cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent; }

  .phone { max-width: 560px; margin: 0 auto; min-height: 100vh; position: relative; }

  /* ── ヘッダー ── */
  header { padding: 16px 16px 0; }
  .h-row { display: flex; align-items: center; justify-content: space-between; }
  .h-row h1 { font-size: 1.1rem; font-weight: 800; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    font-size: 16px; display: flex; align-items: center; justify-content: center;
  }
  .progress { font-size: .78rem; color: var(--muted); margin-top: 2px; }
  .progress b { color: var(--accent); font-size: .95rem; }

  /* ── フィルタチップ ── */
  .filters {
    position: sticky; top: 0; z-index: 50;
    display: flex; gap: 8px; overflow-x: auto;
    padding: 12px 16px; background: var(--bg);
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .fchip {
    flex-shrink: 0; white-space: nowrap;
    background: var(--card2); border: 1px solid var(--border); color: var(--muted);
    border-radius: 999px; padding: 8px 14px; font-size: .82rem; font-family: inherit;
  }
  .fchip.on { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  .fchip .n {
    background: rgba(255,255,255,.25); border-radius: 999px;
    font-size: .68rem; padding: 1px 6px; margin-left: 4px;
  }
  .fchip:not(.on) .n { background: var(--card); color: var(--muted); }

  /* ── リスト ── */
  main { padding: 0 16px 170px; }
  .store-head {
    position: sticky; top: 56px; z-index: 40;
    display: flex; align-items: center; gap: 6px;
    background: var(--bg); padding: 10px 0 6px;
    font-size: .95rem; font-weight: 800; color: var(--gold);
    border-bottom: 1px solid var(--border); margin-bottom: 8px;
  }
  .store-head .cnt { font-size: .7rem; color: var(--muted); font-weight: 600; }
  .cat-title {
    font-size: .7rem; font-weight: 700; color: var(--muted);
    letter-spacing: .5px; margin: 10px 0 6px;
  }
  .item {
    display: flex; align-items: center; gap: 12px; min-height: var(--touch);
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; margin-bottom: 6px;
    transition: opacity .3s;
  }
  .check {
    width: 28px; height: 28px; border: 2px solid var(--muted); border-radius: 50%;
    flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: .85rem; color: transparent; transition: background .15s, border-color .15s;
  }
  .item.checked { opacity: .45; }
  .item.checked .check { background: var(--green); border-color: var(--green); color: #fff; }
  .item.checked .name { text-decoration: line-through; }
  .imain { flex: 1; min-width: 0; }
  .name { font-size: .92rem; font-weight: 600; }
  .meta { font-size: .68rem; color: var(--muted); margin-top: 2px; }
  .catpill {
    background: var(--card2); border: 1px solid var(--border); color: var(--muted);
    font-size: .7rem; padding: 5px 10px; border-radius: 999px; white-space: nowrap;
    font-family: inherit; flex-shrink: 0;
  }

  .empty-hint { color: var(--muted); font-size: .85rem; text-align: center; padding: 24px 0; }

  /* ── 下部固定バー ── */
  .bottom {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 560px; z-index: 100;
    background: var(--bg); opacity: .98;
    border-top: 1px solid var(--border);
    padding: 10px 16px max(12px, env(safe-area-inset-bottom));
  }
  .freq { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
  .freq::-webkit-scrollbar { display: none; }
  .freq:empty { padding-bottom: 0; }
  .freq-chip {
    flex-shrink: 0; white-space: nowrap;
    background: var(--card2); border: 1px solid var(--border); color: var(--text);
    border-radius: 999px; padding: 7px 13px; font-size: .8rem; font-family: inherit;
  }
  .add-row { display: flex; gap: 8px; }
  .add-row input {
    flex: 1; background: var(--card2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 16px; padding: 13px; outline: none;
  }
  .add-row input:focus { border-color: var(--accent); }
  .btn-add {
    background: var(--accent); color: #fff; border-radius: 10px;
    font-size: 1.2rem; font-weight: 700; padding: 0 22px;
  }
  .btn-add:disabled { opacity: .5; }

  /* ── トースト（undo付き） ── */
  .toast {
    position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%);
    background: var(--card2); border: 1px solid var(--accent);
    border-radius: 999px; padding: 9px 16px; font-size: .82rem; z-index: 200;
    display: flex; gap: 12px; align-items: center; white-space: nowrap;
    box-shadow: 0 6px 20px rgba(0,0,0,.35);
    pointer-events: none; opacity: 0; transition: opacity .2s;
  }
  .toast.show { pointer-events: auto; opacity: 1; }
  .toast button {
    background: none; color: var(--accent); font-weight: 800;
    font-size: .82rem;
  }

  footer { text-align: center; font-size: 9px; color: var(--border); padding: 8px; }

  /* ---- Modal ---- */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    width: 100%;
    max-width: 380px;
  }
  .modal-title { font-size: 1rem; font-weight: 800; margin-bottom: 12px; }
  .modal-row { margin-bottom: 12px; }
  .modal-row label { font-size: .78rem; color: var(--muted); display: block; margin-bottom: 6px; }
  .modal-row input[type=text], .modal-row select {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 16px;
    padding: 12px;
    outline: none;
  }
  .modal-row input[type=text]:focus, .modal-row select:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; margin-top: 14px; }
  .modal-btns button { flex: 1; height: 48px; font-size: .88rem; font-weight: 700; border-radius: 8px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--card2); border: 1px solid var(--border); color: var(--muted); }
</style>
</head>
<body>
<div class="phone">

  <header>
    <div class="h-row">
      <h1>🛒 買い物メモ</h1>
      <button class="icon-btn" id="share-btn" title="URLを共有">🔗</button>
    </div>
    <div class="progress" id="progress">あと <b>0</b> 件</div>
  </header>

  <div class="filters" id="filters"></div>

  <main>
    <div id="lists"></div>
    <footer id="deploy-footer"></footer>
  </main>

  <div class="toast" id="toast">
    <span id="toast-msg"></span>
    <button id="toast-action" style="display:none"></button>
  </div>

  <div class="bottom">
    <div class="freq" id="freq-wrap"></div>
    <div class="add-row">
      <input type="text" id="item-input" placeholder="例: 牛乳、シャンプー…" enterkeyhint="done">
      <button class="btn-add" id="add-btn">＋</button>
    </div>
  </div>

</div>

<!-- ニックネーム設定モーダル -->
<div class="modal-overlay" id="nickname-modal">
  <div class="modal-sheet">
    <div class="modal-title">👋 はじめまして</div>
    <div class="modal-row">
      <label>あなたの呼び名（例: 夫、妻、たろう）</label>
      <input type="text" id="nickname-input" placeholder="呼び名を入力">
    </div>
    <div class="modal-btns">
      <button class="btn-primary" id="nickname-save" style="width:100%">はじめる</button>
    </div>
  </div>
</div>

<!-- カテゴリ変更モーダル -->
<div class="modal-overlay" id="cat-modal">
  <div class="modal-sheet">
    <div class="modal-title" id="cat-modal-title">カテゴリを変更</div>
    <div class="modal-row">
      <label>店タイプ</label>
      <select id="cat-store"></select>
    </div>
    <div class="modal-row">
      <label>売り場カテゴリ</label>
      <select id="cat-category"></select>
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" id="cat-cancel">キャンセル</button>
      <button class="btn-primary" id="cat-save">保存</button>
    </div>
  </div>
</div>

<script>
  var listId = (location.pathname.match(/\/l\/([a-zA-Z0-9]+)/) || [])[1];
  if (!listId) {
    // ルート直アクセス時はサーバー側でリダイレクトされるはずだが、念のため
    location.href = '/';
  }

  var STORE_CATEGORIES = {};
  var STORE_ORDER = [];
  var STORE_ICONS = { 'スーパー': '🥬', 'ドラッグストア': '💊', '百均': '💯', 'モール系': '🏬' };
  function storeIcon(store) { return STORE_ICONS[store] || '🛍'; }

  var nickname = localStorage.getItem('shopping_nickname') || '';
  var currentFilter = localStorage.getItem('shopping_filter') || 'all';
  var currentData = { items: [], frequent: [] };
  var editingItemId = null;
  var pollTimer = null;
  var toastTimer = null;

  // id -> { timer, item } : チェック猶予中（2秒）のアイテム。render() をまたいで保持する。
  var pending = {};

  var $ = function(id) { return document.getElementById(id); };

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function escJs(s) { return String(s == null ? '' : s).replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

  // ---- トースト（メッセージのみ or undo アクション付き） ----
  function showToast(msg, opts) {
    opts = opts || {};
    clearTimeout(toastTimer);
    var el = $('toast');
    $('toast-msg').textContent = msg;
    var actionBtn = $('toast-action');
    if (opts.actionLabel && opts.onAction) {
      actionBtn.textContent = opts.actionLabel;
      actionBtn.style.display = '';
      actionBtn.onclick = function() {
        opts.onAction();
        el.classList.remove('show');
      };
    } else {
      actionBtn.style.display = 'none';
      actionBtn.onclick = null;
    }
    el.classList.add('show');
    toastTimer = setTimeout(function() { el.classList.remove('show'); }, opts.duration || 2000);
  }

  // ---- 初期化 ----
  fetch('/api/version').then(function(r){ return r.json(); }).then(function(d){
    $('deploy-footer').textContent = 'deployed: ' + d.deployed_at;
  }).catch(function(){});

  fetch('/api/meta').then(function(r){ return r.json(); }).then(function(d){
    STORE_CATEGORIES = d.store_categories;
    STORE_ORDER = Object.keys(STORE_CATEGORIES);
    buildCatSelects();
    refresh();
    pollTimer = setInterval(refresh, 4000);
  });

  if (!nickname) {
    $('nickname-modal').classList.add('open');
  }
  $('nickname-save').onclick = function() {
    var v = $('nickname-input').value.trim();
    nickname = v || '名無し';
    localStorage.setItem('shopping_nickname', nickname);
    $('nickname-modal').classList.remove('open');
  };

  // ---- 一覧取得・描画 ----
  function refresh() {
    fetch('/api/list/' + listId)
      .then(function(r){ return r.json(); })
      .then(function(data) {
        // render 前に状態退避: 入力中テキスト・フィルタ選択(currentFilter)・チェック猶予中(pending)は
        // currentData とは別に保持しているため、ここで上書きしても消えない。
        currentData = data;
        render();
      })
      .catch(function(){});
  }

  function render() {
    renderProgress();
    renderFilters();
    renderFrequent();
    renderItems();
  }

  function renderProgress() {
    var n = (currentData.items || []).length;
    $('progress').innerHTML = n === 0 ? '全部そろいました 🎉' : 'あと <b>' + n + '</b> 件';
  }

  function renderFilters() {
    var items = currentData.items || [];
    var total = items.length;
    var html = '<button class="fchip' + (currentFilter === 'all' ? ' on' : '') + '" onclick="setFilter(\'all\')">全部 <span class="n">' + total + '</span></button>';
    STORE_ORDER.forEach(function(store) {
      var cnt = items.filter(function(it){ return it.store === store; }).length;
      html += '<button class="fchip' + (currentFilter === store ? ' on' : '') + '" onclick="setFilter(\'' + escJs(store) + '\')">'
        + storeIcon(store) + ' ' + esc(store) + ' <span class="n">' + cnt + '</span></button>';
    });
    $('filters').innerHTML = html;
  }

  function setFilter(store) {
    currentFilter = store;
    localStorage.setItem('shopping_filter', store);
    render();
  }

  function renderFrequent() {
    var freq = currentData.frequent || [];
    var wrap = $('freq-wrap');
    wrap.innerHTML = freq.map(function(f) {
      return '<button class="freq-chip" onclick="quickAdd(\'' + escJs(f.name) + '\')">＋ ' + esc(f.name) + '</button>';
    }).join('');
  }

  function renderItems() {
    var el = $('lists');
    var items = currentData.items || [];
    if (!items.length) {
      el.innerHTML = '<div class="empty-hint">買うものがありません。下の入力欄から追加してください🛒</div>';
      return;
    }

    var html = '';
    STORE_ORDER.forEach(function(store) {
      if (currentFilter !== 'all' && currentFilter !== store) return;
      var storeItems = items.filter(function(it){ return it.store === store; });
      if (!storeItems.length) return;
      html += '<div class="store-head">' + storeIcon(store) + ' ' + esc(store) + ' <span class="cnt">' + storeItems.length + '件</span></div>';
      (STORE_CATEGORIES[store] || []).forEach(function(cat) {
        var catItems = storeItems.filter(function(it){ return it.category === cat; });
        if (!catItems.length) return;
        html += '<div class="cat-title">' + esc(cat) + '</div>';
        catItems.forEach(function(it) {
          var isPending = !!pending[it.id];
          html += '<div class="item' + (isPending ? ' checked' : '') + '">'
            + '<div class="check" onclick="checkItem(\'' + it.id + '\')">✓</div>'
            + '<div class="imain">'
            + '<div class="name">' + esc(it.name) + '</div>'
            + '<div class="meta">' + (it.added_by ? esc(it.added_by) + ' が追加' : '')
            + (isPending ? ' ・ 2秒後に消えます（再タップで取消）' : '') + '</div>'
            + '</div>'
            + '<button class="catpill" onclick="openCatModal(\'' + it.id + '\')">' + esc(it.category) + ' ▾</button>'
            + '</div>';
        });
      });
    });
    el.innerHTML = html || '<div class="empty-hint">この絞り込みに該当する商品はありません</div>';
  }

  // ---- 商品追加 ----
  $('add-btn').onclick = addItem;
  $('item-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addItem();
  });

  function addItem() {
    var input = $('item-input');
    var name = input.value.trim();
    if (!name) return;
    $('add-btn').disabled = true;
    fetch('/api/list/' + listId + '/items', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name: name, nickname: nickname })
    })
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (data.error) { showToast('⚠ ' + data.error); return; }
      input.value = '';
      currentData = data;
      render();
    })
    .catch(function(){ showToast('⚠ 通信エラー'); })
    .finally(function(){ $('add-btn').disabled = false; });
  }

  function quickAdd(name) {
    fetch('/api/list/' + listId + '/frequent/add', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name: name, nickname: nickname })
    })
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (data.error) { showToast('⚠ ' + data.error); return; }
      currentData = data;
      render();
      showToast('✓ ' + name + ' を追加');
    })
    .catch(function(){ showToast('⚠ 通信エラー'); });
  }

  // ---- チェック（購入済み）: checked付与 → 2秒猶予 → API送信 → undoトースト ----
  function checkItem(id) {
    if (pending[id]) {
      // 猶予中の再タップ = 取消（API送信しない）
      clearTimeout(pending[id].timer);
      delete pending[id];
      renderItems();
      return;
    }
    var item = (currentData.items || []).find(function(it){ return it.id === id; });
    if (!item) return;
    pending[id] = {
      item: item,
      timer: setTimeout(function(){ commitCheck(id); }, 2000)
    };
    renderItems();
  }

  function commitCheck(id) {
    var entry = pending[id];
    if (!entry) return;
    delete pending[id];
    var itemSnapshot = entry.item;
    fetch('/api/list/' + listId + '/items/' + id + '/check', { method: 'POST' })
      .then(function(r){ return r.json(); })
      .then(function(data) {
        currentData = data;
        render();
        showToast(itemSnapshot.name + ' をチェックしました', {
          actionLabel: '元に戻す',
          duration: 4000,
          onAction: function(){ undoCheck(itemSnapshot); }
        });
      })
      .catch(function(){ showToast('⚠ 通信エラー'); render(); });
  }

  function undoCheck(item) {
    // check API に undo が無いため、楽観的にローカル復元＋frequent/add API で再登録する。
    fetch('/api/list/' + listId + '/frequent/add', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name: item.name, nickname: nickname })
    })
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (data.error) { showToast('⚠ ' + data.error); return; }
      currentData = data;
      render();
      showToast('✓ 元に戻しました');
    })
    .catch(function(){ showToast('⚠ 通信エラー'); });
  }

  // ---- カテゴリ変更 ----
  function buildCatSelects() {
    var storeSel = $('cat-store');
    storeSel.innerHTML = STORE_ORDER.map(function(s){ return '<option value="' + esc(s) + '">' + esc(s) + '</option>'; }).join('');
    storeSel.onchange = function() { fillCategorySelect(storeSel.value); };
    fillCategorySelect(STORE_ORDER[0]);
  }
  function fillCategorySelect(store) {
    var catSel = $('cat-category');
    var cats = STORE_CATEGORIES[store] || [];
    catSel.innerHTML = cats.map(function(c){ return '<option value="' + esc(c) + '">' + esc(c) + '</option>'; }).join('');
  }

  function openCatModal(itemId) {
    editingItemId = itemId;
    var item = (currentData.items || []).find(function(it){ return it.id === itemId; });
    if (!item) return;
    $('cat-modal-title').textContent = esc(item.name) + ' のカテゴリ';
    $('cat-store').value = item.store;
    fillCategorySelect(item.store);
    $('cat-category').value = item.category;
    $('cat-modal').classList.add('open');
  }
  $('cat-cancel').onclick = function() { $('cat-modal').classList.remove('open'); };
  $('cat-save').onclick = function() {
    var store = $('cat-store').value;
    var category = $('cat-category').value;
    fetch('/api/list/' + listId + '/items/' + editingItemId + '/category', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ store: store, category: category })
    })
    .then(function(r){ return r.json(); })
    .then(function(data) {
      currentData = data;
      render();
      $('cat-modal').classList.remove('open');
    })
    .catch(function(){ showToast('⚠ 通信エラー'); });
  };

  // ---- 共有 ----
  $('share-btn').onclick = function() {
    var url = location.href;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(function(){ showToast('✓ URLをコピーしました'); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = url;
      ta.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch(e) {}
      document.body.removeChild(ta);
      showToast('✓ URLをコピーしました');
    }
  };
</script>
</body>
</html>
